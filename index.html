<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TourneyPro">
<link rel="manifest" href="manifest.json">
<title>TourneyPro - Football Tournament Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #0a1628;
    --pitch-mid: #112240;
    --pitch-light: #1a3a6b;
    --accent: #f5a623;
    --accent2: #00e5a0;
    --red: #ff4757;
    --text: #e8eaf6;
    --muted: #7986a8;
    --card: #0f1f3d;
    --border: rgba(255,255,255,0.08);
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Barlow', sans-serif; background: var(--pitch); color: var(--text); }

  #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }

  /* SCREENS */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* SCROLL AREAS */
  .scroll-area { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* TOP NAV */
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; background: var(--pitch); border-bottom: 1px solid var(--border); }
  .top-bar h1 { font-family: 'Bebas Neue'; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
  .top-bar .back-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .top-bar .action-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 7px 14px; font-family: 'Barlow'; font-weight: 700; font-size: 13px; cursor: pointer; }

  /* BOTTOM NAV */
  .bottom-nav { display: flex; background: var(--card); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom, 0); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; background: none; border: none; cursor: pointer; color: var(--muted); transition: color 0.2s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 10px; font-family: 'Barlow Condensed'; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

  /* CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .card-row { display: flex; align-items: center; justify-content: space-between; }
  .card h3 { font-family: 'Barlow Condensed'; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); }
  .card p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* BADGES */
  .badge { display: inline-block; font-size: 11px; font-family: 'Barlow Condensed'; font-weight: 700; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; }
  .badge-green { background: rgba(0,229,160,0.15); color: var(--accent2); }
  .badge-amber { background: rgba(245,166,35,0.15); color: var(--accent); }
  .badge-red { background: rgba(255,71,87,0.15); color: var(--red); }
  .badge-blue { background: rgba(26,58,107,0.5); color: #7eb8ff; }

  /* FORMS */
  input, select, textarea { width: 100%; background: var(--pitch-mid); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; color: var(--text); font-family: 'Barlow'; font-size: 14px; outline: none; -webkit-appearance: none; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--pitch-mid); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-family: 'Barlow Condensed'; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

  /* BUTTONS */
  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius); font-family: 'Barlow Condensed'; font-size: 17px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-secondary { background: var(--pitch-light); color: var(--text); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-sm { padding: 7px 14px; font-size: 13px; width: auto; display: inline-block; }

  /* HOME SCREEN */
  .home-hero { background: linear-gradient(135deg, var(--pitch-light) 0%, var(--pitch-mid) 100%); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden; }
  .home-hero::before { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(245,166,35,0.08); }
  .home-hero h2 { font-family: 'Bebas Neue'; font-size: 32px; letter-spacing: 2px; line-height: 1; color: var(--text); }
  .home-hero p { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .home-hero .big-num { font-family: 'Bebas Neue'; font-size: 64px; color: var(--accent); line-height: 1; }
  .no-items { text-align: center; padding: 40px 20px; color: var(--muted); }
  .no-items .icon { font-size: 48px; margin-bottom: 12px; }
  .no-items p { font-size: 14px; line-height: 1.5; }

  /* TEAM LIST ITEM */
  .team-item { display: flex; align-items: center; gap: 12px; }
  .team-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .team-info { flex: 1; min-width: 0; }
  .team-info strong { font-size: 14px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-info small { font-size: 12px; color: var(--muted); }

  /* FIXTURE CARD */
  .fixture-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .fixture-match { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .team-side { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .team-side.home { align-items: flex-start; }
  .team-side.away { align-items: flex-end; }
  .team-name { font-family: 'Barlow Condensed'; font-size: 15px; font-weight: 700; letter-spacing: 0.3px; text-align: center; }
  .team-name.home { text-align: left; }
  .team-name.away { text-align: right; }
  .score-box { display: flex; align-items: center; gap: 6px; }
  .score-num { font-family: 'Bebas Neue'; font-size: 28px; color: var(--text); min-width: 24px; text-align: center; }
  .score-sep { font-family: 'Bebas Neue'; font-size: 20px; color: var(--muted); }
  .score-input { width: 44px; background: var(--pitch-mid); border: 1px solid var(--border); border-radius: 8px; padding: 6px; color: var(--text); font-family: 'Bebas Neue'; font-size: 22px; text-align: center; outline: none; }
  .score-input:focus { border-color: var(--accent); }
  .fixture-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }

  /* POINTS TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table th { font-family: 'Barlow Condensed'; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--border); }
  table th:first-child { text-align: left; padding-left: 4px; }
  table td { padding: 10px 6px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
  table td:first-child { text-align: left; padding-left: 4px; }
  table tr:last-child td { border-bottom: none; }
  .rank-num { font-family: 'Bebas Neue'; font-size: 16px; color: var(--muted); }
  .rank-1 { color: var(--accent); }
  .rank-2 { color: #c0c0c0; }
  .rank-3 { color: #cd7f32; }
  .pts-num { font-family: 'Bebas Neue'; font-size: 18px; color: var(--accent); }
  .team-name-td { font-weight: 600; font-size: 13px; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .form-dots { display: flex; gap: 3px; }
  .form-dot { width: 8px; height: 8px; border-radius: 50%; }
  .form-dot.W { background: var(--accent2); }
  .form-dot.D { background: var(--accent); }
  .form-dot.L { background: var(--red); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--pitch-mid); border-radius: 20px 20px 0 0; padding: 20px 16px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal h2 { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 1px; margin-bottom: 16px; }

  /* TOAST */
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent2); color: #000; padding: 10px 20px; border-radius: 30px; font-family: 'Barlow Condensed'; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; opacity: 0; transition: all 0.3s; z-index: 200; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-family: 'Barlow Condensed'; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  /* ROUND HEADER */
  .round-header { display: flex; align-items: center; gap: 10px; margin: 16px 0 8px; }
  .round-label { font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: 1px; color: var(--accent); background: rgba(245,166,35,0.1); padding: 3px 10px; border-radius: 6px; }
  .round-line { flex: 1; height: 1px; background: var(--border); }

  /* FILTER TABS */
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-family: 'Barlow Condensed'; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; background: var(--card); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .filter-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* KNOCKOUT BRACKET */
  .bracket-round { margin-bottom: 20px; }
  .bracket-round h4 { font-family: 'Bebas Neue'; font-size: 14px; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 8px; }

  /* STAT BAR */
  .stat-bar-wrap { margin: 4px 0 10px; }
  .stat-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-bar { height: 6px; background: var(--pitch-light); border-radius: 3px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

  .color-picker-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 8px; margin-top: 8px; }
  .color-swatch { width: 100%; aspect-ratio: 1; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
  .color-swatch.selected { border-color: white; }

  /* KNOCKOUT INPUT */
  .ko-match { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .ko-team-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .ko-team-row:first-child { border-bottom: 1px solid var(--border); }
  .ko-team-name { flex: 1; font-size: 13px; font-weight: 600; }
  .ko-score-in { width: 40px; background: var(--pitch-mid); border: 1px solid var(--border); border-radius: 6px; padding: 5px; color: var(--text); font-family: 'Bebas Neue'; font-size: 18px; text-align: center; outline: none; }
  .ko-score-in:focus { border-color: var(--accent); }
  .winner-crown { color: var(--accent); font-size: 14px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="top-bar">
      <h1>⚽ TourneyPro</h1>
      <button class="action-btn" onclick="showModal('modal-new-tournament')">+ New</button>
    </div>
    <div class="scroll-area" id="home-list">
      <!-- dynamically populated -->
    </div>
    <div class="bottom-nav" id="bottom-nav-home">
      <button class="nav-btn active" onclick="showHome()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" onclick="showAbout()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        <span>About</span>
      </button>
    </div>
  </div>

  <!-- TOURNAMENT SCREEN -->
  <div class="screen" id="screen-tournament">
    <div class="top-bar">
      <button class="back-btn" onclick="showHome()">←</button>
      <h1 id="tourn-title">Tournament</h1>
      <button class="action-btn" id="tourn-edit-btn" onclick="editTournament()">Edit</button>
    </div>
    <div class="filter-tabs" style="padding: 10px 16px 0; background: var(--pitch);">
      <div class="filter-tab active" onclick="switchTab('overview')">Overview</div>
      <div class="filter-tab" onclick="switchTab('teams')">Teams</div>
      <div class="filter-tab" onclick="switchTab('fixtures')">Fixtures</div>
      <div class="filter-tab" onclick="switchTab('table')">Table</div>
      <div class="filter-tab" id="tab-knockout" style="display:none" onclick="switchTab('knockout')">Knockout</div>
    </div>
    <div class="scroll-area" id="tab-content"></div>
    <div class="bottom-nav">
      <button class="nav-btn active" onclick="switchTab('overview')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        <span>Overview</span>
      </button>
      <button class="nav-btn" onclick="switchTab('teams')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span>Teams</span>
      </button>
      <button class="nav-btn" onclick="switchTab('fixtures')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        <span>Fixtures</span>
      </button>
      <button class="nav-btn" onclick="switchTab('table')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 2C6.81 2 3 5.81 3 10.5S6.81 19 11.5 19h.5v3c4.86-2.34 8-7 8-11.5C20 5.81 16.19 2 11.5 2zm1 14.5h-2v-2h2v2zm0-4h-2c0-3.25 3-3 3-5 0-1.1-.9-2-2-2s-2 .9-2 2h-2c0-2.21 1.79-4 4-4s4 1.79 4 4c0 2.5-3 2.75-3 5z"/></svg>
        <span>Table</span>
      </button>
    </div>
  </div>

  <!-- MODALS -->

  <!-- New Tournament Modal -->
  <div class="modal-overlay" id="modal-new-tournament">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>New Tournament</h2>
      <div class="form-group">
        <label>Tournament Name</label>
        <input type="text" id="new-tourn-name" placeholder="e.g. Dhaka Premier League 2025">
      </div>
      <div class="form-group">
        <label>Format</label>
        <select id="new-tourn-format">
          <option value="league">League (Round Robin)</option>
          <option value="groups+knockout">Groups + Knockout</option>
          <option value="knockout">Knockout Only</option>
        </select>
      </div>
      <div class="form-group" id="new-tourn-groups-wrap" style="display:none">
        <label>Number of Groups</label>
        <select id="new-tourn-groups">
          <option value="2">2 Groups</option>
          <option value="4">4 Groups</option>
        </select>
      </div>
      <div class="form-group">
        <label>Points for Win</label>
        <input type="number" id="new-tourn-pts-win" value="3" min="1" max="10">
      </div>
      <div class="form-group">
        <label>Points for Draw</label>
        <input type="number" id="new-tourn-pts-draw" value="1" min="0" max="5">
      </div>
      <div class="form-group">
        <label>Points for Loss</label>
        <input type="number" id="new-tourn-pts-loss" value="0" min="0" max="3">
      </div>
      <button class="btn btn-primary" onclick="createTournament()">Create Tournament</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="closeModal('modal-new-tournament')">Cancel</button>
    </div>
  </div>

  <!-- Add Team Modal -->
  <div class="modal-overlay" id="modal-add-team">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Add Team</h2>
      <div class="form-group">
        <label>Team Name</label>
        <input type="text" id="new-team-name" placeholder="e.g. Dhaka FC">
      </div>
      <div class="form-group">
        <label>Short Name (3 letters)</label>
        <input type="text" id="new-team-short" placeholder="DFC" maxlength="3" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label>Team Color</label>
        <div class="color-picker-grid" id="color-picker"></div>
      </div>
      <div class="form-group" id="team-group-field" style="display:none">
        <label>Group</label>
        <select id="new-team-group"></select>
      </div>
      <button class="btn btn-primary" onclick="addTeam()">Add Team</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="closeModal('modal-add-team')">Cancel</button>
    </div>
  </div>

  <!-- Enter Result Modal -->
  <div class="modal-overlay" id="modal-result">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2 id="result-title">Enter Result</h2>
      <div style="display:grid;grid-template-columns:1fr 40px 1fr;align-items:center;gap:10px;margin:16px 0;">
        <div style="text-align:center">
          <div class="team-name" id="result-home" style="font-size:16px;margin-bottom:8px;"></div>
          <input type="number" class="score-input" id="result-home-score" min="0" max="99" placeholder="0" style="width:60px;font-size:28px;padding:8px">
        </div>
        <div style="font-family:'Bebas Neue';font-size:22px;color:var(--muted);text-align:center">VS</div>
        <div style="text-align:center">
          <div class="team-name" id="result-away" style="font-size:16px;margin-bottom:8px;"></div>
          <input type="number" class="score-input" id="result-away-score" min="0" max="99" placeholder="0" style="width:60px;font-size:28px;padding:8px">
        </div>
      </div>
      <div class="form-group">
        <label>Match Date</label>
        <input type="date" id="result-date">
      </div>
      <div class="form-group">
        <label>Venue (optional)</label>
        <input type="text" id="result-venue" placeholder="Stadium name">
      </div>
      <button class="btn btn-primary" onclick="saveResult()">Save Result</button>
      <button class="btn btn-outline" style="margin-top:8px" onclick="closeModal('modal-result')">Cancel</button>
    </div>
  </div>

  <!-- Schedule Match Modal -->
  <div class="modal-overlay" id="modal-schedule">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Schedule Match</h2>
      <div class="form-group">
        <label>Home Team</label>
        <select id="sch-home"></select>
      </div>
      <div class="form-group">
        <label>Away Team</label>
        <select id="sch-away"></select>
      </div>
      <div class="form-group">
        <label>Match Date</label>
        <input type="date" id="sch-date">
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="sch-time" value="18:00">
      </div>
      <div class="form-group">
        <label>Venue (optional)</label>
        <input type="text" id="sch-venue" placeholder="Stadium / Ground name">
      </div>
      <div class="form-group">
        <label>Round / Matchweek</label>
        <input type="text" id="sch-round" placeholder="e.g. Matchday 1">
      </div>
      <button class="btn btn-primary" onclick="scheduleMatch()">Schedule Match</button>

<script>
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722','#607d8b','#ffffff'];
let selectedColor = COLORS[2];
let db = JSON.parse(localStorage.getItem('tourneyPro') || '{"tournaments":[]}');
let currentTournId = null;
let currentTab = 'overview';
let editingFixtureId = null;
let editingKOId = null;

function save() { localStorage.setItem('tourneyPro', JSON.stringify(db)); }
function getTourn() { return db.tournaments.find(t => t.id === currentTournId); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function showModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target === el) el.classList.remove('open'); });
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('new-tourn-format').addEventListener('change', function() {
  document.getElementById('new-tourn-groups-wrap').style.display = this.value === 'groups+knockout' ? 'block' : 'none';
});

// Build color picker
function buildColorPicker() {
  const el = document.getElementById('color-picker');
  el.innerHTML = COLORS.map(c => `<div class="color-swatch${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
}
function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
  event.target.classList.add('selected');
}

// HOME
function showHome() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-home').classList.add('active');
  renderHome();
}

function renderHome() {
  const el = document.getElementById('home-list');
  if(!db.tournaments.length) {
    el.innerHTML = `<div class="home-hero"><h2>Football Tournament Manager</h2><p>Create & manage full tournaments with fixtures, results & live standings</p></div>
    <div class="no-items"><div class="icon">🏆</div><p>No tournaments yet.<br>Tap <strong>+ New</strong> to get started.</p></div>`;
    return;
  }
  el.innerHTML = `<div class="home-hero">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><h2>Your Tournaments</h2><p>${db.tournaments.length} tournament${db.tournaments.length>1?'s':''}</p></div>
      <div class="big-num">${db.tournaments.length}</div>
    </div>
  </div>` + db.tournaments.map(t => {
    const teams = t.teams.length;
    const played = t.fixtures.filter(f => f.played).length;
    return `<div class="card" onclick="openTournament('${t.id}')">
      <div class="card-row">
        <div>
          <h3>${t.name}</h3>

        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="badge badge-blue">${t.format==='league'?'League':t.format==='groups+knockout'?'Groups+KO':'Knockout'}</span>
          <span style="font-size:20px">›</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function showAbout() {
  toast('Share this app via link or QR code — works on any Android browser!');
}

// CREATE TOURNAMENT
function createTournament() {
  const name = document.getElementById('new-tourn-name').value.trim();
  if(!name) { toast('Please enter a tournament name'); return; }
  const format = document.getElementById('new-tourn-format').value;

    id: uid(),

    fixtures: [],
    knockoutRounds: [],

  };
  db.tournaments.push(t);
  save();
  closeModal('modal-new-tournament');

}

function editTournament() {
  const t = getTourn();
  if(!t) return;
  if(!confirm(`Delete "${t.name}"?`)) return;
  db.tournaments = db.tournaments.filter(x => x.id !== t.id);

// OPEN TOURNAMENT
function openTournament(id) {
  currentTournId = id;
  currentTab = 'overview';
  const t = getTourn();

// TABS
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.filter-tab').forEach((el,i) => {
    const tabs = ['overview','teams','fixtures','table','knockout'];
    el.classList.toggle('active', tabs[i] === tab);
  });

    el.classList.toggle('active', tabs[i] === tab);
  });
  renderTab();
}

function renderTab() {
  const tab = currentTab;
  if(tab === 'overview') renderOverview();
  else if(tab === 'teams') renderTeams();
  else if(tab === 'fixtures') renderFixtures();
  else if(tab === 'table') renderTable();
  else if(tab === 'knockout') renderKnockout();
}

// OVERVIEW
function renderOverview() {
  const t = getTourn();

  const next = t.fixtures.filter(f=>!f.played).slice(0,3);
  const table = computeTable(t);
  const leader = table[0];

  let html = `<div class="card">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
      <div><div style="font-family:'Bebas Neue';font-size:28px;color:var(--accent)">${t.teams.length}</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-family:'Barlow Condensed';font-weight:700">Teams</div></div>
      <div><div style="font-family:'Bebas Neue';font-size:28px;color:var(--accent2)">${played}</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-family:'Barlow Condensed';font-weight:700">Played</div></div>
      <div><div style="font-family:'Bebas Neue';font-size:28px;color:var(--text)">${goals}</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;font-family:'Barlow Condensed';font-weight:700">Goals</div></div>
    </div>
  </div>`;

  if(leader) {
    html += `<div style="margin-bottom:6px" class="section-title">🏆 Current Leader</div>
    <div class="card" style="border-color:rgba(245,166,35,0.3)">
      <div style="display:flex;align-items:center;gap:12px">

        <div style="flex:1">
          <div style="font-family:'Barlow Condensed';font-weight:700;font-size:17px">${leader.name}</div>
          <div style="font-size:12px;color:var(--muted)">${leader.played} played · ${leader.gd >= 0?'+':''}${leader.gd} GD</div>
        </div>
        <div style="font-family:'Bebas Neue';font-size:36px;color:var(--accent)">${leader.pts}</div>
      </div>

  }

    html += `<div style="margin-bottom:6px;margin-top:8px" class="section-title">📅 Upcoming Fixtures</div>`;
    next.forEach(f => {
      const home = t.teams.find(tm=>tm.id===f.homeId);
      const away = t.teams.find(tm=>tm.id===f.awayId);
      if(!home||!away) return;
      html += `<div class="fixture-card">
        <div class="fixture-match">
          <div class="team-side home"><div class="team-name home" style="font-size:13px">${home.name}</div></div>
          <div style="font-family:'Bebas Neue';font-size:14px;color:var(--muted);text-align:center">VS</div>
          <div class="team-side away"><div class="team-name away" style="font-size:13px">${away.name}</div></div>
        </div>
        ${f.date ? `<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:6px">${f.date}${f.time?' · '+f.time:''}${f.venue?' · '+f.venue:''}</div>` : ''}

// TEAMS
function renderTeams() {
  const t = getTourn();
  buildColorPicker();

  // Setup group field
  const gField = document.getElementById('team-group-field');
  if(t.format === 'groups+knockout') {
    gField.style.display = 'block';

  }

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="section-title">${t.teams.length} Teams</div>

  </div>`;

  } else {
    if(t.format === 'groups+knockout') {
      for(let g=0;g<t.numGroups;g++) {
        const gTeams = t.teams.filter(tm=>tm.group===g);

        gTeams.forEach(tm => html += teamCard(tm, t));
      }

        html += `<div class="section-title" style="margin-bottom:8px;margin-top:16px">Ungrouped</div>`;
        noGroup.forEach(tm => html += teamCard(tm, t));

  }

function teamCard(tm, t) {
  const stats = computeTable(t).find(s=>s.id===tm.id);
  return `<div class="card">
    <div class="team-item">
      <div class="team-avatar" style="background:${tm.color};color:${getTextColor(tm.color)}">${tm.short||tm.name.slice(0,3).toUpperCase()}</div>
      <div class="team-info">
        <strong>${tm.name}</strong>
        <small>${stats?`${stats.played} P · ${stats.won} W · ${stats.drawn} D · ${stats.lost} L`:'No matches'}</small>
      </div>
      <button class="btn btn-danger btn-sm" onclick="removeTeam('${tm.id}')">✕</button>
    </div>
  </div>`;
}

function addTeam() {
  const t = getTourn();
  const name = document.getElementById('new-team-name').value.trim();
  if(!name) { toast('Enter team name'); return; }
  const short = document.getElementById('new-team-short').value.trim().toUpperCase() || name.slice(0,3).toUpperCase();

  closeModal('modal-add-team');
  document.getElementById('new-team-name').value = '';
  document.getElementById('new-team-short').value = '';

  renderTeams();

function removeTeam(id) {
  const t = getTourn();
  if(!confirm('Remove this team?')) return;
  t.teams = t.teams.filter(tm=>tm.id!==id);
  t.fixtures = t.fixtures.filter(f=>f.homeId!==id && f.awayId!==id);
  save();
  renderTeams();
  toast('Team removed');
}

// FIXTURES
function generateFixtures() {
  const t = getTourn();
  if(t.fixtures.length) {
    if(!confirm('This will replace existing fixtures. Continue?')) return;
  }
  t.fixtures = [];

  if(t.format === 'league') {
    t.fixtures = roundRobin(t.teams, 'MW');
  } else if(t.format === 'groups+knockout') {
    for(let g=0;g<t.numGroups;g++) {
      const gTeams = t.teams.filter(tm=>tm.group===g);
      t.fixtures.push(...roundRobin(gTeams, `Group ${String.fromCharCode(65+g)} - MD`));
    }
  } else {
    // Knockout: just leave fixtures empty, manage in knockout tab
  }
  save();
  toast('Fixtures generated!');
  switchTab('fixtures');
}

function roundRobin(teams, prefix) {
  const fixtures = [];
  let mw = 1;
  const n = teams.length;
  const teamsCopy = [...teams];
  if(n % 2 !== 0) teamsCopy.push({id:'bye',name:'BYE'});
  const half = teamsCopy.length / 2;
  const rounds = teamsCopy.length - 1;

  for(let r=0;r<rounds;r++) {
    const round = `${prefix} ${r+1}`;
    for(let m=0;m<half;m++) {
      const h = teamsCopy[m];
      const a = teamsCopy[teamsCopy.length-1-m];
      if(h.id!=='bye' && a.id!=='bye') {
        fixtures.push({id:uid(), homeId:h.id, awayId:a.id, round, played:false, homeScore:null, awayScore:null, date:'', venue:''});
      }
    }
    const last = teamsCopy.pop();
    teamsCopy.splice(1,0,last);
  }
  return fixtures;
}

function renderFixtures() {
  const t = getTourn();
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="section-title">${t.fixtures.length} Matches</div>
    <button class="btn btn-primary btn-sm" onclick="openScheduleModal()">+ Add Match</button>
  </div>`;

  if(!t.fixtures.length) {
    html += `<div class="no-items"><div class="icon">📅</div><p>No fixtures yet.<br>${t.teams.length>=2?'Tap ⚡ in Teams tab to generate.':'Add teams first.'}</p></div>`;
    document.getElementById('tab-content').innerHTML = html;
    return;
  }

  const rounds = [...new Set(t.fixtures.map(f=>f.round||'Unscheduled'))];
  rounds.forEach(round => {
    const matches = t.fixtures.filter(f=>(f.round||'Unscheduled')===round);
    html += `<div class="round-header"><div class="round-label">${round}</div><div class="round-line"></div></div>`;
    matches.forEach(f => {
      const home = t.teams.find(tm=>tm.id===f.homeId);
      const away = t.teams.find(tm=>tm.id===f.awayId);
      if(!home||!away) return;
      html += `<div class="fixture-card">
        <div class="fixture-match">
          <div class="team-side home">
            <div class="team-name home">${home.name}</div>
            <div style="width:8px;height:8px;border-radius:50%;background:${home.color};margin-top:2px"></div>

            ${f.played ? `<span class="score-num">${f.homeScore}</span><span class="score-sep">-</span><span class="score-num">${f.awayScore}</span>` : `<span style="font-family:'Bebas Neue';font-size:18px;color:var(--muted)">VS</span>`}
          </div>
          <div class="team-side away">
            <div class="team-name away">${away.name}</div>
            <div style="width:8px;height:8px;border-radius:50%;background:${away.color};margin-top:2px;align-self:flex-end"></div>
          </div>
        </div>
        <div class="fixture-meta">
          <div style="font-size:11px;color:var(--muted)">${f.date||''}${f.time?' '+f.time:''}${f.venue?' · '+f.venue:''}</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick="openResultModal('${f.id}')">${f.played?'✏️ Edit':'▶ Result'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteFixture('${f.id}')">✕</button>
          </div>
        </div>
      </div>`;
    });
  });

  document.getElementById('tab-content').innerHTML = html;
}

function openScheduleModal() {
  const t = getTourn();
  const sel1 = document.getElementById('sch-home');
  const sel2 = document.getElementById('sch-away');
  sel1.innerHTML = sel2.innerHTML = t.teams.map(tm=>`<option value="${tm.id}">${tm.name}</option>`).join('');
  if(t.teams.length > 1) sel2.selectedIndex = 1;

}

function scheduleMatch() {
  const t = getTourn();
  const homeId = document.getElementById('sch-home').value;
  const awayId = document.getElementById('sch-away').value;
  if(homeId === awayId) { toast('Home and away must be different teams'); return; }
  t.fixtures.push({
    id: uid(), homeId, awayId,
    round: document.getElementById('sch-round').value || 'Matchday',
    date: document.getElementById('sch-date').value,
    time: document.getElementById('sch-time').value,
    venue: document.getElementById('sch-venue').value,
    played: false, homeScore: null, awayScore: null
  });
  save();
  closeModal('modal-schedule');
  toast('Match scheduled!');
  renderFixtures();
}

function deleteFixture(id) {
  const t = getTourn();
  if(!confirm('Delete this fixture?')) return;
  t.fixtures = t.fixtures.filter(f=>f.id!==id);
  save();
  renderFixtures();
  toast('Fixture deleted');
}

function openResultModal(fid) {
  const t = getTourn();
  const f = t.fixtures.find(x=>x.id===fid);
  const home = t.teams.find(tm=>tm.id===f.homeId);
  const away = t.teams.find(tm=>tm.id===f.awayId);
  editingFixtureId = fid;
  document.getElementById('result-home').textContent = home.name;
  document.getElementById('result-away').textContent = away.name;
  document.getElementById('result-home-score').value = f.homeScore !== null ? f.homeScore : '';
  document.getElementById('result-away-score').value = f.awayScore !== null ? f.awayScore : '';
  document.getElementById('result-date').value = f.date || new Date().toISOString().split('T')[0];
  document.getElementById('result-venue').value = f.venue || '';
  document.getElementById('result-title').textContent = `${home.name} vs ${away.name}`;
  showModal('modal-result');
}

function saveResult() {
  const t = getTourn();
  const f = t.fixtures.find(x=>x.id===editingFixtureId);
  const hs = parseInt(document.getElementById('result-home-score').value);
  const as = parseInt(document.getElementById('result-away-score').value);
  if(isNaN(hs)||isNaN(as)||hs<0||as<0) { toast('Enter valid scores'); return; }
  f.homeScore = hs; f.awayScore = as;
  f.played = true;
  f.date = document.getElementById('result-date').value;
  f.venue = document.getElementById('result-venue').value;
  save();
  closeModal('modal-result');
  toast('Result saved!');
  renderFixtures();
}

// TABLE
function computeTable(t) {
  return t.teams.map(tm => {
    let played=0,won=0,drawn=0,lost=0,gf=0,ga=0,pts=0,form=[];
    const matches = t.fixtures.filter(f=>f.played && (f.homeId===tm.id||f.awayId===tm.id));
    matches.forEach(f => {
      const isHome = f.homeId===tm.id;
      const myG = isHome?f.homeScore:f.awayScore;
      const oppG = isHome?f.awayScore:f.homeScore;
      played++; gf+=myG; ga+=oppG;
      if(myG>oppG){won++;pts+=t.ptsWin;form.push('W');}
      else if(myG===oppG){drawn++;pts+=t.ptsDraw;form.push('D');}
      else{lost++;pts+=t.ptsLoss;form.push('L');}
    });
    return { id:tm.id, name:tm.name, short:tm.short, color:tm.color, played, won, drawn, lost, gf, ga, gd:gf-ga, pts, form: form.slice(-5) };
  }).sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
}

function renderTable() {
  const t = getTourn();
  const table = computeTable(t);

  if(t.format==='groups+knockout') {
    let html = '';
    for(let g=0;g<t.numGroups;g++) {
      const gTeams = t.teams.filter(tm=>tm.group===g).map(tm=>tm.id);
      const gTable = table.filter(r=>gTeams.includes(r.id));
      html += `<div class="section-title" style="margin-bottom:8px;margin-top:${g?'20px':'0'}">Group ${String.fromCharCode(65+g)}</div>`;
      html += renderTableHTML(gTable, t);
    }
    document.getElementById('tab-content').innerHTML = html;
  } else {
    document.getElementById('tab-content').innerHTML = renderTableHTML(table, t);
  }
}

function renderTableHTML(table, t) {
  if(!table.length) return '<div class="no-items"><div class="icon">📊</div><p>Add teams and play matches to see standings.</p></div>';
  return `<div class="card" style="padding:0;overflow:hidden">
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th style="text-align:left;min-width:90px">Team</th>
        <th>P</th><th>W</th><th>D</th><th>L</th>
        <th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th>
      </tr></thead>
      <tbody>
      ${table.map((row, i) => {
        const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
        return `<tr>
          <td><span class="rank-num ${rankClass}">${i+1}</span></td>
          <td>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:8px;height:8px;border-radius:50%;background:${row.color};flex-shrink:0"></div>
              <span class="team-name-td">${row.name}</span>
            </div>
          </td>
          <td>${row.played}</td><td>${row.won}</td><td>${row.drawn}</td><td>${row.lost}</td>
          <td>${row.gf}</td><td>${row.ga}</td>
          <td style="color:${row.gd>0?'var(--accent2)':row.gd<0?'var(--red)':'var(--muted)'}">${row.gd>0?'+':''}${row.gd}</td>
          <td><span class="pts-num">${row.pts}</span></td>
          <td>
            <div class="form-dots">${row.form.map(f=>`<div class="form-dot ${f}"></div>`).join('')}</div>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <div style="display:flex;align-items:center;gap:4px"><div class="form-dot W"></div><span style="font-size:11px;color:var(--muted)">Win</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div class="form-dot D"></div><span style="font-size:11px;color:var(--muted)">Draw</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div class="form-dot L"></div><span style="font-size:11px;color:var(--muted)">Loss</span></div>
  </div>`;
}

// KNOCKOUT
function renderKnockout() {
  const t = getTourn();
  const koRounds = ['Round of 16','Quarter-final','Semi-final','Final'];
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title">Knockout Stage</div>
    <button class="btn btn-primary btn-sm" onclick="addKORound()">+ Add Round</button>
  </div>`;

  if(!t.knockoutRounds || !t.knockoutRounds.length) {
    html += `<div class="no-items"><div class="icon">🏆</div><p>No knockout rounds yet.<br>Tap <strong>+ Add Round</strong> to create one.</p></div>`;
    document.getElementById('tab-content').innerHTML = html;
    return;
  }

  t.knockoutRounds.forEach((round, ri) => {
    html += `<div class="round-header"><div class="round-label">${round.name}</div><div class="round-line"></div><button style="background:none;border:none;color:var(--red);font-size:13px;cursor:pointer;padding:2px 6px" onclick="deleteKORound(${ri})">✕</button></div>`;
    round.matches.forEach((m, mi) => {
      const homeTeam = t.teams.find(tm=>tm.id===m.homeId);
      const awayTeam = t.teams.find(tm=>tm.id===m.awayId);
      const homeName = homeTeam ? homeTeam.name : (m.homeName||'TBD');
      const awayName = awayTeam ? awayTeam.name : (m.awayName||'TBD');
      const winner = m.played ? getKOWinner(m, homeTeam, awayTeam) : null;
      html += `<div class="ko-match">
        <div class="ko-team-row">
          <div style="width:8px;height:8px;border-radius:50%;background:${homeTeam?.color||'#555'};flex-shrink:0"></div>
          <div class="ko-team-name">${homeName}</div>
          ${m.played ? `<div style="font-family:'Bebas Neue';font-size:18px;min-width:20px;text-align:center">${m.homeScore}</div>${winner?.id===m.homeId?'<span class="winner-crown">👑</span>':''}` : ''}
        </div>
        <div class="ko-team-row">
          <div style="width:8px;height:8px;border-radius:50%;background:${awayTeam?.color||'#555'};flex-shrink:0"></div>
          <div class="ko-team-name">${awayName}</div>
          ${m.played ? `<div style="font-family:'Bebas Neue';font-size:18px;min-width:20px;text-align:center">${m.awayScore}</div>${winner?.id===m.awayId?'<span class="winner-crown">👑</span>':''}` : ''}
        </div>
        ${m.played && m.homePens !== undefined ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center">Pens: ${m.homePens} - ${m.awayPens}</div>` : ''}
        <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
          <button class="btn btn-secondary btn-sm" onclick="openKOResult(${ri},${mi})">${m.played?'✏️ Edit':'▶ Result'}</button>
        </div>
      </div>`;
    });
    html += `<button class="btn btn-outline btn-sm" style="margin-top:4px;margin-bottom:8px" onclick="addKOMatch(${ri})">+ Add Match to ${round.name}</button>`;
  });

  document.getElementById('tab-content').innerHTML = html;
}

function getKOWinner(m, homeTeam, awayTeam) {
  if(m.homeScore > m.awayScore) return homeTeam;
  if(m.awayScore > m.homeScore) return awayTeam;
  if(m.homePens !== undefined && m.awayPens !== undefined) {
    return m.homePens > m.awayPens ? homeTeam : awayTeam;
  }
  return null;
}

function addKORound() {
  const t = getTourn();
  const names = ['Round of 16','Quarter-final','Semi-final','Final','Third Place'];
  const used = (t.knockoutRounds||[]).map(r=>r.name);
  const next = names.find(n=>!used.includes(n)) || `Round ${(t.knockoutRounds||[]).length+1}`;
  const name = prompt('Round name:', next);
  if(!name) return;
  if(!t.knockoutRounds) t.knockoutRounds = [];
  t.knockoutRounds.push({ name, matches: [] });
  save();
  renderKnockout();
  toast(`${name} added`);
}

function deleteKORound(ri) {
  const t = getTourn();
  if(!confirm('Delete this round?')) return;
  t.knockoutRounds.splice(ri,1);
  save();
  renderKnockout();
}

function addKOMatch(ri) {
  const t = getTourn();
  const teamOpts = [{id:'',name:'TBD'}, ...t.teams];
  const h = prompt('Home team (number):\n'+teamOpts.map((tm,i)=>`${i}. ${tm.name}`).join('\n'));
  if(h===null) return;
  const a = prompt('Away team (number):\n'+teamOpts.map((tm,i)=>`${i}. ${tm.name}`).join('\n'));
  if(a===null) return;
  const hi = parseInt(h)||0, ai = parseInt(a)||0;
  const homeTeam = teamOpts[hi]||teamOpts[0];
  const awayTeam = teamOpts[ai]||teamOpts[0];
  t.knockoutRounds[ri].matches.push({
    id: uid(),
    homeId: homeTeam.id||null, homeName: homeTeam.name,
    awayId: awayTeam.id||null, awayName: awayTeam.name,
    played: false, homeScore: null, awayScore: null
  });
  save();
  renderKnockout();
  toast('Match added');
}

function openKOResult(ri, mi) {
  const t = getTourn();
  const m = t.knockoutRounds[ri].matches[mi];
  editingKOId = {ri, mi};
  const homeTeam = t.teams.find(tm=>tm.id===m.homeId);
  const awayTeam = t.teams.find(tm=>tm.id===m.awayId);
  document.getElementById('ko-home-name').textContent = homeTeam?.name || m.homeName || 'TBD';
  document.getElementById('ko-away-name').textContent = awayTeam?.name || m.awayName || 'TBD';
  document.getElementById('ko-home-score').value = m.homeScore !== null ? m.homeScore : '';
  document.getElementById('ko-away-score').value = m.awayScore !== null ? m.awayScore : '';
  document.getElementById('ko-home-pens').value = m.homePens !== undefined ? m.homePens : '';
  document.getElementById('ko-away-pens').value = m.awayPens !== undefined ? m.awayPens : '';
  document.getElementById('ko-result-title').textContent = `${homeTeam?.name||m.homeName||'TBD'} vs ${awayTeam?.name||m.awayName||'TBD'}`;
  showModal('modal-ko-result');
}

function saveKOResult() {
  const t = getTourn();
  const {ri, mi} = editingKOId;
  const m = t.knockoutRounds[ri].matches[mi];
  const hs = parseInt(document.getElementById('ko-home-score').value);
  const as = parseInt(document.getElementById('ko-away-score').value);
  if(isNaN(hs)||isNaN(as)||hs<0||as<0) { toast('Enter valid scores'); return; }
  m.homeScore = hs; m.awayScore = as;
  m.played = true;
  const hp = parseInt(document.getElementById('ko-home-pens').value);
  const ap = parseInt(document.getElementById('ko-away-pens').value);
  if(!isNaN(hp) && !isNaN(ap)) { m.homePens = hp; m.awayPens = ap; }
  save();
  closeModal('modal-ko-result');
  toast('Result saved!');
  renderKnockout();
}

// UTILS
function getTextColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 128 ? '#000' : '#fff';
}
